name: snapshot-full-rebuild

on:
  workflow_dispatch:
  schedule:
    - cron: "15 */6 * * *"

permissions:
  contents: read

concurrency:
  group: snapshot-full-rebuild
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    env:
      POSTGRES_URL: ${{ secrets.POSTGRES_URL || secrets.NEON_DATABASE_URL }}
      NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
      SAMEHADAKU_COOKIE: ${{ secrets.SAMEHADAKU_COOKIE }}
      TMDB_READ_TOKEN: ${{ secrets.TMDB_READ_TOKEN }}
      TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
      DWIZZYWEEB_PUSH_TOKEN: ${{ secrets.DWIZZYWEEB_PUSH_TOKEN }}
      DWIZZYWEEB_PUSH: "1"
      DWIZZYWEEB_BRANCH: main
      DWIZZYWEEB_GIT_COMMIT_MESSAGE: "chore: rebuild media snapshots"
    steps:
      - name: Checkout dwizzySCRAPE
        uses: actions/checkout@v4

      - name: Checkout dwizzyWEEB
        if: ${{ env.DWIZZYWEEB_PUSH_TOKEN != '' }}
        uses: actions/checkout@v4
        with:
          repository: dwirijal/dwizzyWEEB
          token: ${{ secrets.DWIZZYWEEB_PUSH_TOKEN }}
          path: dwizzyWEEB

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Refresh read models
        run: ./scripts/cron-media-maintenance.sh

      - name: Rebuild snapshot bundle
        env:
          DWIZZYWEEB_DIR: ${{ github.workspace }}/dwizzyWEEB
        run: ./scripts/publish-weeb-snapshots.sh build

      - name: Push rebuilt snapshot bundle
        if: ${{ env.DWIZZYWEEB_PUSH_TOKEN != '' }}
        env:
          DWIZZYWEEB_DIR: ${{ github.workspace }}/dwizzyWEEB
        run: ./scripts/push-weeb-snapshot-bundle.sh
